name: void-archive

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      specific_repo:
        description: 'TEST: Single URL to sync (empty = first repo in list)'
        required: false
        default: ''
      add_repos:
        description: 'ADD: New URLs to add (one per line, duplicates ignored)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.email "void-archive@noreply"
          git config --global user.name "void-archive"
          git config --global credential.helper ""
          git config --global core.askPass ""

      # ── Add new repos to repos.txt if provided ───────────────
      - name: Add repos to list
        if: ${{ github.event.inputs.add_repos != '' }}
        env:
          ADD_REPOS: ${{ github.event.inputs.add_repos }}
        run: |
          ADDED=0
          SKIPPED=0

          # Split on https:// to handle GitHub Actions collapsing newlines
          SPLIT_REPOS=$(echo "$ADD_REPOS"             | sed 's|https://|\nhttps://|g'             | grep '^https://')

          while IFS= read -r url; do
            url=$(echo "$url" | tr -d '[:space:]')
            [ -z "$url" ] && continue

            if grep -qF "$url" repos.txt; then
              echo "⏭️  Already exists: $(basename $url .git)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo "$url" >> repos.txt
            echo "➕ Added: $(basename $url .git)"
            ADDED=$((ADDED + 1))
          done <<< "$SPLIT_REPOS"

          echo "📊 Added: $ADDED  Skipped: $SKIPPED"

          if [ "$ADDED" -gt 0 ]; then
            git add repos.txt
            git commit -m "repos: add $ADDED new repo(s)"
            git push
          fi

      # ── Run sync ─────────────────────────────────────────────
      - name: Run sync
        env:
          REMOTE_TOKEN:  ${{ secrets.REMOTE_TOKEN }}
          REMOTE_URL:    ${{ secrets.REMOTE_URL }}
          PARENT_FOLDER: ${{ secrets.PARENT_FOLDER }}
          REPOS_FILE:    repos.txt
          SINGLE_REPO:   ${{ github.event.inputs.specific_repo }}
          ADD_REPOS:     ${{ github.event.inputs.add_repos }}
          IS_MANUAL:     ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "$IS_MANUAL" = "true" ]; then

            if [ -n "$SINGLE_REPO" ]; then
              echo "🎯 Single repo mode: provided URL"
              echo "$SINGLE_REPO" > repos.txt

            elif [ -n "$ADD_REPOS" ]; then
              echo "📥 Syncing newly added repos only"
              printf '%s\n' "$ADD_REPOS" | while IFS= read -r line; do
                line=$(echo "$line" | tr -d '[:space:]')
                echo "$line"
              done | grep '^http' > repos.txt

            else
              echo "🎯 Single repo mode: first in list"
              FIRST=$(grep -v '^\s*#' repos.txt | grep -v '^\s*$' | head -n 1)
              echo "$FIRST" > repos.txt
            fi

          else
            echo "📋 Scheduled run — using full repos.txt"
          fi

          chmod +x scripts/sync.sh
          bash scripts/sync.sh || true

      # ── Generate group README ─────────────────────────────────
      - name: Generate README
        if: always()
        env:
          REMOTE_TOKEN:  ${{ secrets.REMOTE_TOKEN }}
          REMOTE_URL:    ${{ secrets.REMOTE_URL }}
          PARENT_FOLDER: ${{ secrets.PARENT_FOLDER }}
          PROFILE_REPO:  ${{ secrets.PROFILE_REPO }}
          REPOS_FILE:    repos.txt
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout repos.txt 2>/dev/null || true
          chmod +x scripts/generate-readme.sh
          bash scripts/generate-readme.sh

      # ── Upload log ───────────────────────────────────────────
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-log-${{ github.run_id }}
          path: /tmp/sync.log
          retention-days: 30

      # ── Print log ────────────────────────────────────────────
      - name: Print log
        if: always()
        run: cat /tmp/sync.log || true