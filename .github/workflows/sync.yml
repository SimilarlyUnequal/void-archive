name: void-archive

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      specific_repo:
        description: 'TEST: Single URL to sync (empty = first repo in list)'
        required: false
        default: ''
      add_repos:
        description: 'ADD: New URLs to add (one per line, duplicates ignored)'
        required: false
        default: ''
      skip_sync:
        description: 'README only: skip sync, regenerate README from existing state'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.email "void-archive@noreply"
          git config --global user.name "void-archive"
          git config --global credential.helper ""
          git config --global core.askPass ""

      # ── Add new repos to repos.txt ───────────────────────────
      - name: Add repos to list
        if: ${{ github.event.inputs.add_repos != '' && github.event.inputs.skip_sync != 'true' }}
        env:
          ADD_REPOS: ${{ github.event.inputs.add_repos }}
        run: |
          ADDED=0
          SKIPPED=0

          while IFS= read -r url; do
            [ -z "$url" ] && continue
            if grep -qF "$url" repos.txt; then
              echo "⏭️  Already exists: $(basename $url .git)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            echo "$url" >> repos.txt
            echo "➕ Added: $(basename $url .git)"
            ADDED=$((ADDED + 1))
          done <<< "$(echo "$ADD_REPOS" | python3 scripts/split-urls.py)"

          echo "📊 Added: $ADDED  Skipped: $SKIPPED"

          if [ "$ADDED" -gt 0 ]; then
            git add repos.txt
            git commit -m "repos: add $ADDED new repo(s)"
            git push
          fi

      # ── Fetch previous state for SHA comparison ───────────────
      # Pulls state.json from GitHub private repo so sync.sh
      # can skip repos that have not changed since last run
      - name: Fetch previous state
        if: ${{ github.event.inputs.skip_sync != 'true' }}
        env:
          STATE_REPO_URL:   ${{ secrets.STATE_REPO_URL }}
          STATE_REPO_TOKEN: ${{ secrets.STATE_REPO_TOKEN }}
        run: |
          STATE_REMOTE="https://${STATE_REPO_TOKEN}@${STATE_REPO_URL#https://}"
          if git clone "$STATE_REMOTE" /tmp/void-state 2>/dev/null; then
            if [ -f /tmp/void-state/state.json ]; then
              cp /tmp/void-state/state.json /tmp/prev-state.json
              echo "✅ Previous state loaded"
            else
              echo "⚠️  No state.json in backup — first run"
            fi
          else
            echo "⚠️  Could not clone state repo — first run"
          fi

      # ── Run sync ─────────────────────────────────────────────
      - name: Run sync
        if: ${{ github.event.inputs.skip_sync != 'true' }}
        env:
          REMOTE_TOKEN:  ${{ secrets.REMOTE_TOKEN }}
          REMOTE_URL:    ${{ secrets.REMOTE_URL }}
          PARENT_FOLDER: ${{ secrets.PARENT_FOLDER }}
          REPOS_FILE:    repos.txt
          SINGLE_REPO:   ${{ github.event.inputs.specific_repo }}
          ADD_REPOS:     ${{ github.event.inputs.add_repos }}
          IS_MANUAL:     ${{ github.event_name == 'workflow_dispatch' }}
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$IS_MANUAL" = "true" ]; then
            if [ -n "$SINGLE_REPO" ]; then
              echo "🎯 Single repo mode: provided URL"
              echo "$SINGLE_REPO" > repos.txt

            elif [ -n "$ADD_REPOS" ]; then
              echo "📥 Syncing newly added repos only"
              echo "$ADD_REPOS" | python3 scripts/split-urls.py > repos.txt
              echo "URLs to sync:"
              cat repos.txt

            else
              echo "🎯 Single repo mode: first in list"
              FIRST=$(grep -v '^\s*#' repos.txt | grep -v '^\s*$' | head -n 1)
              echo "$FIRST" > repos.txt
            fi
          else
            echo "📋 Scheduled run — using full repos.txt"
          fi

          chmod +x scripts/sync.sh
          bash scripts/sync.sh || true

      # ── Generate README ───────────────────────────────────────
      - name: Generate README
        if: always()
        env:
          REMOTE_TOKEN:     ${{ secrets.REMOTE_TOKEN }}
          REMOTE_URL:       ${{ secrets.REMOTE_URL }}
          PARENT_FOLDER:    ${{ secrets.PARENT_FOLDER }}
          PROFILE_REPO:     ${{ secrets.PROFILE_REPO }}
          STATE_REPO_URL:   ${{ secrets.STATE_REPO_URL }}
          STATE_REPO_TOKEN: ${{ secrets.STATE_REPO_TOKEN }}
          REPOS_FILE:       repos.txt
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          README_ONLY:      ${{ github.event.inputs.skip_sync == 'true' && 'true' || 'false' }}
        run: |
          git checkout repos.txt 2>/dev/null || true
          chmod +x scripts/generate-readme.sh
          bash scripts/generate-readme.sh

      # ── Upload log ───────────────────────────────────────────
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-log-${{ github.run_id }}
          path: /tmp/sync.log
          retention-days: 30

      # ── Print log ────────────────────────────────────────────
      - name: Print log
        if: always()
        run: cat /tmp/sync.log || true