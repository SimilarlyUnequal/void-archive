name: void-archive — sync

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      specific_repo:
        description: 'Single URL to test (empty = first repo in list)'
        required: false
        default: ''
      force_full:
        description: 'Force full clone — ignore SHA check, re-sync everything'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.email "void-archive@noreply"
          git config --global user.name "void-archive"
          git config --global credential.helper ""
          git config --global core.askPass ""

      # ── Fetch previous state for SHA comparison ───────────────
      - name: Fetch previous state
        env:
          STATE_REPO_URL:   ${{ secrets.STATE_REPO_URL }}
          STATE_REPO_TOKEN: ${{ secrets.STATE_REPO_TOKEN }}
        run: |
          STATE_REMOTE="https://${STATE_REPO_TOKEN}@${STATE_REPO_URL#https://}"
          if git clone "$STATE_REMOTE" /tmp/void-state 2>/dev/null; then
            if [ -f /tmp/void-state/state.json ]; then
              cp /tmp/void-state/state.json /tmp/prev-state.json
              echo "✅ Previous state loaded"
            else
              echo "⚠️  No state.json found — first run"
            fi
          else
            echo "⚠️  Could not clone state repo — first run"
          fi

      # ── Run sync ─────────────────────────────────────────────
      - name: Run sync
        env:
          REMOTE_TOKEN:  ${{ secrets.REMOTE_TOKEN }}
          REMOTE_URL:    ${{ secrets.REMOTE_URL }}
          PARENT_FOLDER: ${{ secrets.PARENT_FOLDER }}
          REPOS_FILE:    repos.txt
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          FORCE_FULL:        ${{ github.event.inputs.force_full == 'true' && 'true' || 'false' }}
          SINGLE_REPO:       ${{ github.event.inputs.specific_repo }}
          IS_MANUAL:         ${{ github.event_name == 'workflow_dispatch' }}
          GITHUB_WORKSPACE:  ${{ github.workspace }}
        run: |
          touch "$GITHUB_WORKSPACE/lfs-repos.txt"

          if [ "$IS_MANUAL" = "true" ] && [ -n "$SINGLE_REPO" ]; then
            echo "🎯 Single repo mode"
            echo "$SINGLE_REPO" > repos.txt
          elif [ "$IS_MANUAL" = "true" ] && [ -z "$SINGLE_REPO" ] && [ "$FORCE_FULL" != "true" ]; then
            echo "🎯 First repo mode"
            FIRST=$(grep -v '^\s*#' repos.txt | grep -v '^\s*$' | head -n 1)
            echo "$FIRST" > repos.txt
          else
            echo "📋 Full repos.txt"
          fi

          chmod +x scripts/sync.sh
          bash scripts/sync.sh || true

      # ── Commit repos.txt + lfs-repos.txt if changed ──────────
      - name: Commit file changes
        run: |
          git add repos.txt lfs-repos.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "📋 No file changes to commit"
          else
            git commit -m "sync: update repo lists"
            git push
            echo "✅ Committed repos.txt + lfs-repos.txt"
          fi

      # ── Generate README ───────────────────────────────────────
      - name: Generate README
        if: always()
        env:
          REMOTE_TOKEN:     ${{ secrets.REMOTE_TOKEN }}
          REMOTE_URL:       ${{ secrets.REMOTE_URL }}
          PARENT_FOLDER:    ${{ secrets.PARENT_FOLDER }}
          PROFILE_REPO:     ${{ secrets.PROFILE_REPO }}
          STATE_REPO_URL:   ${{ secrets.STATE_REPO_URL }}
          STATE_REPO_TOKEN: ${{ secrets.STATE_REPO_TOKEN }}
          REPOS_FILE:       repos.txt
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          README_ONLY:      "false"
        run: |
          git checkout repos.txt 2>/dev/null || true
          chmod +x scripts/generate-readme.sh
          bash scripts/generate-readme.sh

      # ── Upload log ───────────────────────────────────────────
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-log-${{ github.run_id }}
          path: /tmp/sync.log
          retention-days: 30

      - name: Print log
        if: always()
        run: cat /tmp/sync.log || true